server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/geocompare?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:user}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

yandex:
  api:
    key: ${YANDEX_API_KEY}
    geocode-url: https://geocode-maps.yandex.ru/1.x

dadata:
  api:
    key: ${DADATA_API_KEY}
    secret: ${DADATA_API_SECRET}
    geocode-url:  https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address