version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: geo-compare-mysql
    environment:
      MYSQL_DATABASE: geocompare
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - geo-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: geo-compare-app
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      DADATA_API_KEY: ${DADATA_API_KEY}
      DADATA_API_SECRET: ${DADATA_API_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - geo-net
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  geo-net:
    driver: bridge